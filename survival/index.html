<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unity Web Player | Merger Game</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-fit">
      <canvas id="unity-canvas" class="unity-fit" width="960" height="600" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Merger Game</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var kRefW = 960;
      var kRefH = 600;

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      function layoutGameCanvas() {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var scale = Math.min(vw / kRefW, vh / kRefH);
        var cw = Math.max(1, Math.floor(kRefW * scale));
        var ch = Math.max(1, Math.floor(kRefH * scale));
        canvas.style.width = cw + "px";
        canvas.style.height = ch + "px";
      }
      layoutGameCanvas();
      window.addEventListener("resize", layoutGameCanvas, { passive: true });

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/full_build.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/full_build.data",
        frameworkUrl: buildUrl + "/full_build.framework.js",
        codeUrl: buildUrl + "/full_build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Merger Game",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      var dpr = window.devicePixelRatio || 1;
      config.devicePixelRatio = Math.min(dpr, 2);

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      if ("fetchPriority" in script) script.fetchPriority = "high";
      script.onload = () => {
        layoutGameCanvas();
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                var fsBtn = document.querySelector("#unity-fullscreen-button");
                fsBtn.onclick = () => {
                  unityInstance.SetFullscreen(1);
                };

                function tryBrowserFullscreenFromGesture() {
                  try {
                    unityInstance.SetFullscreen(1);
                  } catch (e) {}
                }
                function onUserActivate() {
                  document.removeEventListener("pointerdown", onUserActivate, true);
                  document.removeEventListener("click", onUserActivate, true);
                  document.removeEventListener("touchend", onUserActivate, true);
                  tryBrowserFullscreenFromGesture();
                }
                document.addEventListener("pointerdown", onUserActivate, true);
                document.addEventListener("click", onUserActivate, true);
                document.addEventListener("touchend", onUserActivate, true);

              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
