<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="theme-color" content="#231F20">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Unity Web Player | Merger Game</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-fit">
      <canvas id="unity-canvas" class="unity-fit" width="960" height="600" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div id="unity-load-caption" aria-live="polite" aria-busy="true">
          <div id="unity-load-pct">0%</div>
          <div id="unity-load-sub"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Merger Game</div>
      </div>
    </div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js", { scope: "./" }).catch(function () {});
        });
      }

      var canvas = document.querySelector("#unity-canvas");
      var kRefW = 960;
      var kRefH = 600;

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      function layoutGameCanvas() {
        var vv = window.visualViewport;
        var vw = vv ? vv.width : window.innerWidth;
        var vh = vv ? vv.height : window.innerHeight;
        var scale = Math.min(vw / kRefW, vh / kRefH);
        var cw = Math.max(1, Math.floor(kRefW * scale));
        var ch = Math.max(1, Math.floor(kRefH * scale));
        canvas.style.width = cw + "px";
        canvas.style.height = ch + "px";
      }
      layoutGameCanvas();
      window.addEventListener("resize", layoutGameCanvas, { passive: true });
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", layoutGameCanvas, { passive: true });
        window.visualViewport.addEventListener("scroll", layoutGameCanvas, { passive: true });
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/full_build.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/full_build.data",
        frameworkUrl: buildUrl + "/full_build.framework.js",
        codeUrl: buildUrl + "/full_build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Merger Game",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      var dpr = window.devicePixelRatio || 1;
      config.devicePixelRatio = Math.min(dpr, 1.25);

      document.querySelector("#unity-loading-bar").style.display = "flex";

      var loadPctEl = document.getElementById("unity-load-pct");
      var loadSubEl = document.getElementById("unity-load-sub");
      var loadCaptionEl = document.getElementById("unity-load-caption");
      var lastProgress = -1;
      var stallInterval = null;

      function updateLoadSubtext() {
        if (!loadSubEl) return;
        var p = lastProgress;
        if (p >= 1) return;
        if (p < 0.82) {
          loadSubEl.textContent = "Loading game files…";
          return;
        }
        loadSubEl.textContent = "Compiling game assets, ~30 seconds left.";
      }

      stallInterval = window.setInterval(updateLoadSubtext, 400);

      var script = document.createElement("script");
      script.src = loaderUrl;
      if ("fetchPriority" in script) script.fetchPriority = "high";
      script.onload = () => {
        layoutGameCanvas();
        createUnityInstance(canvas, config, (progress) => {
          lastProgress = progress;
          var pct = Math.min(100, Math.max(0, Math.round(progress * 100)));
          if (loadPctEl) loadPctEl.textContent = pct + "%";
          document.querySelector("#unity-progress-bar-full").style.width = pct + "%";
          updateLoadSubtext();
              }).then((unityInstance) => {
                if (stallInterval) {
                  clearInterval(stallInterval);
                  stallInterval = null;
                }
                if (loadCaptionEl) loadCaptionEl.setAttribute("aria-busy", "false");
                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-container").classList.add("game-ready");
                var fsBtn = document.querySelector("#unity-fullscreen-button");
                fsBtn.onclick = () => {
                  unityInstance.SetFullscreen(1);
                };

              }).catch((message) => {
                if (stallInterval) {
                  clearInterval(stallInterval);
                  stallInterval = null;
                }
                if (loadCaptionEl) loadCaptionEl.setAttribute("aria-busy", "false");
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
