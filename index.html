<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Choose the quest</title>
    <link rel="stylesheet" href="hub.css" />
  </head>
  <body>
    <main class="page">
      <h1 class="title">Choose the quest</h1>

      <div class="cards">
        <a
          class="quest-card quest-card--memory"
          href="memory/index.html"
          aria-label="Hungry Memory Game — 4x4 matching game"
        >
          <span class="quest-card__label">Memory game</span>
        </a>
        <a
          class="quest-card quest-card--camp"
          href="survival/index.html"
          aria-label="Camp Quest — merge game"
        >
          <span class="quest-card__label">Camp Quest</span>
        </a>
      </div>

      <p class="subtitle">Select a card to open that quest.</p>
    </main>
  </body>
</html>
